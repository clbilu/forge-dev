name = "forge-api"
main = "src/index.js"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "forge"
database_id = "YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "R2"
bucket_name = "forge-assets"

[vars]
FRONTEND_URL = "https://your-app.pages.dev"

# Secrets — set with: wrangler secret put JWT_SECRET
# JWT_SECRET — random string 64+ chars
